<body>
  <!-- ═══════════════════════════════════════════════════════════
       QuadCarve – Chisel UI  (ApricityUI HTML Frontend)
       Layout: 320 × 220 px  (compact for default MC GUI scale)
       ═══════════════════════════════════════════════════════════ -->

  <!-- Carved-item slot (ApricityUI bound slot, index 0 of ChiselMenu) -->
  <container id="qc-chisel-container" style="display:none">
    <slot id="qc-carved-slot"></slot>
  </container>

  <!-- Root panel -->
  <div id="qc-root">

    <!-- Left sidebar: tool strip -->
    <div id="qc-tools">
      <button id="btn-split"  class="qc-tool active" title="Split (S)">✦</button>
      <button id="btn-remove" class="qc-tool"        title="Remove (R)">✕</button>
      <hr class="qc-divider">
      <button id="btn-zoom-in"  class="qc-tool" title="Zoom In (+)">＋</button>
      <button id="btn-zoom-out" class="qc-tool" title="Zoom Out (-)">－</button>
      <button id="btn-reset"    class="qc-tool" title="Reset View">⌂</button>
      <hr class="qc-divider">
      <!-- Material palette swatches (populated by JS) -->
      <div id="qc-swatches"></div>
    </div>

    <!-- Centre: canvas viewport -->
    <div id="qc-viewport">
      <canvas id="qc-canvas"></canvas>
      <div id="qc-overlay-msg"></div>
    </div>

    <!-- Right sidebar: slot + info -->
    <div id="qc-info">
      <div class="qc-label">Carving</div>
      <!-- Transparent overlay aligns with the ApricityUI slot -->
      <div id="qc-slot-anchor">
        <slot id="qc-display-slot" style="--aui-slot-size:32px"></slot>
      </div>
      <div class="qc-label" id="qc-stat-depth">Depth –</div>
      <div class="qc-label" id="qc-stat-fill">Fill –</div>
      <div class="qc-label" id="qc-stat-done" style="display:none">✔ Done</div>
    </div>

  </div>

</body>

<style>
/* ── Reset / base ─────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 320px; height: 220px;
  background: transparent;
  font-family: "Minecraftia", monospace, sans-serif;
  font-size: 7px;
  color: #e0e0e0;
  overflow: hidden;
  user-select: none;
}

/* ── Root flex layout ─────────────────────────────────────── */
#qc-root {
  display: flex;
  width: 320px; height: 220px;
  background: rgba(20, 14, 8, 0.88);
  border: 2px solid #5a4020;
}

/* ── Left tool strip ─────────────────────────────────────── */
#qc-tools {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 22px;
  padding: 4px 2px;
  background: rgba(0,0,0,0.3);
  border-right: 1px solid #3a2a10;
}

.qc-tool {
  width: 16px; height: 16px;
  background: rgba(80,60,30,0.6);
  border: 1px solid #6a4a20;
  color: #c8b060;
  font-size: 9px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
  transition: background 0.1s;
}
.qc-tool:hover  { background: rgba(120,90,40,0.8); }
.qc-tool.active { background: rgba(160,120,50,0.9); border-color: #d4a040; color: #ffe060; }

.qc-divider {
  width: 14px; border: none;
  border-top: 1px solid #3a2a10;
  margin: 1px 0;
}

#qc-swatches {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; margin-top: 2px;
}
.qc-swatch {
  width: 12px; height: 12px;
  border: 1px solid #555;
  cursor: pointer;
  border-radius: 1px;
}
.qc-swatch.active { border-color: #fff; }

/* ── Viewport ─────────────────────────────────────────────── */
#qc-viewport {
  position: relative;
  flex: 1;
  overflow: hidden;
  cursor: crosshair;
  background: #0a0a0a;
}

#qc-canvas {
  position: absolute;
  top: 0; left: 0;
  image-rendering: pixelated;
}

#qc-overlay-msg {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: #888;
  pointer-events: none;
}

/* ── Right info panel ────────────────────────────────────── */
#qc-info {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  width: 50px; padding: 4px 2px;
  background: rgba(0,0,0,0.25);
  border-left: 1px solid #3a2a10;
}

.qc-label {
  font-size: 6px;
  color: #a0906a;
  text-align: center;
  line-height: 1.4;
  word-break: break-all;
}

#qc-slot-anchor {
  width: 34px; height: 34px;
  border: 1px solid #5a4020;
  display: flex; align-items: center; justify-content: center;
}

#qc-stat-done { color: #50e050; }
</style>

<script>
/* ══════════════════════════════════════════════════════════════
   QuadCarve – Chisel UI Script
   ══════════════════════════════════════════════════════════════ */

(function () {
  'use strict';

  /* ── DOM refs ─────────────────────────────────────────────── */
  const canvas   = document.getElementById('qc-canvas');
  const vp       = document.getElementById('qc-viewport');
  const ctx      = canvas.getContext('2d');
  const msgEl    = document.getElementById('qc-overlay-msg');
  const swatches = document.getElementById('qc-swatches');
  const statDepth = document.getElementById('qc-stat-depth');
  const statFill  = document.getElementById('qc-stat-fill');
  const statDone  = document.getElementById('qc-stat-done');

  /* ── State ────────────────────────────────────────────────── */
  let tree      = null;   // decoded quadtree: {idx, children:[4]|null}
  let palette   = [];     // [{type, id?, color?}]
  let finished  = false;

  let mode      = 'split';  // 'split' | 'remove'
  let activeMat = 0;        // palette index for SET_MAT

  // View transform
  let scale  = 1.0;
  let panX   = 0;
  let panY   = 0;

  // Drag / pan
  let dragging = false;
  let dragX0   = 0;
  let dragY0   = 0;
  let panX0    = 0;
  let panY0    = 0;

  // Debounce queue
  const pendingActions = [];
  let debounceTimer    = null;
  const DEBOUNCE_MS    = 80;

  // Optimistic in-memory tree (mirrors server tree + pending ops)
  let optimisticTree = null;

  /* ── Palette colour helpers ───────────────────────────────── */
  const PALETTE_COLOURS = {
    EMPTY: '#111111',
    SPLIT: null, // drawn via children
  };

  function paletteColour(idx) {
    const e = palette[idx];
    if (!e) return '#333';
    if (e.type === 'EMPTY') return '#111';
    if (e.type === 'SPLIT') return null;
    // CUSTOM – use color field (ARGB int)
    const c = e.color >>> 0;
    const r = (c >> 16) & 0xff;
    const g = (c >> 8)  & 0xff;
    const b =  c        & 0xff;
    return `rgb(${r},${g},${b})`;
  }

  /* ── Canvas resize to viewport ────────────────────────────── */
  function resizeCanvas() {
    const w = vp.clientWidth  || 200;
    const h = vp.clientHeight || 200;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
      redraw();
    }
  }

  /* ── Tree rendering ───────────────────────────────────────── */
  function drawNode(node, x, y, size) {
    if (!node) return;

    if (node.children) {
      // Internal (SPLIT) node – recurse into quadrants
      const half = size / 2;
      drawNode(node.children[0], x,        y,        half);
      drawNode(node.children[1], x + half, y,        half);
      drawNode(node.children[2], x,        y + half, half);
      drawNode(node.children[3], x + half, y + half, half);
    } else {
      // Leaf node – fill with palette colour
      const col = paletteColour(node.idx);
      if (col) {
        ctx.fillStyle = col;
        ctx.fillRect(x, y, size, size);
      }
      // Grid outline for visible granularity
      if (size >= 3) {
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth   = 0.5;
        ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);
      }
    }
  }

  function redraw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    if (!optimisticTree) {
      msgEl.textContent = 'Place a carved item in the slot';
      return;
    }
    msgEl.textContent = '';

    // Background
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(0, 0, W, H);

    // Apply view transform
    ctx.save();
    const size = Math.min(W, H) * scale;
    const ox   = (W - size) / 2 + panX;
    const oy   = (H - size) / 2 + panY;
    ctx.translate(ox, oy);

    drawNode(optimisticTree, 0, 0, size);

    // Hover highlight
    if (hoverPath !== null) {
      drawHighlight(hoverPath, size);
    }

    ctx.restore();

    // Update stats
    const d = treeDepth(optimisticTree);
    const { filled, total } = treeStats(optimisticTree);
    statDepth.textContent = 'Depth ' + d;
    statFill.textContent  = total > 0
      ? 'Fill ' + Math.round(filled / total * 100) + '%'
      : 'Fill –';
    statDone.style.display = finished ? '' : 'none';
  }

  function drawHighlight(path, rootSize) {
    let x = 0, y = 0, size = rootSize;
    for (const ch of path) {
      const half = size / 2;
      const q    = parseInt(ch);
      if (q === 1 || q === 3) x += half;
      if (q >= 2)             y += half;
      size = half;
    }
    ctx.strokeStyle = 'rgba(255,220,60,0.8)';
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
  }

  /* ── Tree helpers ─────────────────────────────────────────── */
  function treeDepth(node) {
    if (!node || !node.children) return 1;
    let max = 0;
    for (const c of node.children) max = Math.max(max, treeDepth(c));
    return max + 1;
  }

  function treeStats(node, acc = { filled: 0, total: 0 }) {
    if (!node) return acc;
    if (!node.children) {
      acc.total++;
      if (node.idx > 1) acc.filled++;
      return acc;
    }
    for (const c of node.children) treeStats(c, acc);
    return acc;
  }

  /* ── Convert Java CarvingData (Rhino interop) to JS format ── */
  function buildJSPalette(javaPalette) {
    const arr = [];
    for (let i = 0; i < javaPalette.size(); i++) {
      const e = javaPalette.get(i);
      arr.push({ type: e.type.name(), color: e.color, id: e.textureId });
    }
    return arr;
  }

  function buildJSTree(javaNode) {
    if (!javaNode.isSubdivided()) {
      return { idx: javaNode.getPaletteIndex(), children: null };
    }
    const ch = javaNode.getChildren();
    return {
      idx: 1,
      children: [
        buildJSTree(ch[0]),
        buildJSTree(ch[1]),
        buildJSTree(ch[2]),
        buildJSTree(ch[3]),
      ],
    };
  }

  /* ── Optimistic tree operations ───────────────────────────── */
  function cloneTree(node) {
    if (!node) return null;
    if (!node.children) return { idx: node.idx, children: null };
    return { idx: node.idx, children: node.children.map(cloneTree) };
  }

  function optimisticSplit(node, path, depth = 0) {
    if (depth === path.length) {
      if (node.children) return; // already split
      node.idx      = 1;
      node.children = [0, 1, 2, 3].map(() => ({ idx: 0, children: null }));
      return;
    }
    if (!node.children) {
      // Auto-split on the way down
      const parentIdx = node.idx;
      node.idx        = 1;
      node.children   = [0, 1, 2, 3].map(() => ({ idx: parentIdx, children: null }));
    }
    const q = parseInt(path[depth]);
    optimisticSplit(node.children[q], path, depth + 1);
  }

  function optimisticRemove(node, path, depth = 0) {
    if (depth === path.length) {
      node.idx      = 0;
      node.children = null;
      return;
    }
    if (!node.children) return;
    const q = parseInt(path[depth]);
    optimisticRemove(node.children[q], path, depth + 1);
  }

  /* ── Screen → path mapping ────────────────────────────────── */
  let hoverPath = null;

  function screenToPath(sx, sy) {
    const W = canvas.width, H = canvas.height;
    const size = Math.min(W, H) * scale;
    const ox   = (W - size) / 2 + panX;
    const oy   = (H - size) / 2 + panY;

    let lx = sx - ox, ly = sy - oy;
    if (lx < 0 || ly < 0 || lx >= size || ly >= size) return null;

    // Walk the tree to find the leaf under cursor
    let path = '';
    let node = optimisticTree;
    let sz   = size;

    while (node && node.children) {
      const half = sz / 2;
      const qx   = lx >= half ? 1 : 0;
      const qy   = ly >= half ? 1 : 0;
      const q    = qx + qy * 2;
      path += q;
      if (qx) lx -= half;
      if (qy) ly -= half;
      sz   = half;
      node = node.children[q];
    }
    return path;
  }

  /* ── Debounced packet send ────────────────────────────────── */
  function queueAction(path, action, paletteIdx = 0) {
    pendingActions.push({ path, action, paletteIdx });
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(flushActions, DEBOUNCE_MS);
  }

  function flushActions() {
    if (!pendingActions.length) return;
    const batch = pendingActions.splice(0);
    // Merge consecutive same-type ops on same path (keep last)
    const merged = [];
    const seen   = new Map();
    for (const op of batch) {
      const key = op.path + '|' + op.action;
      seen.set(key, op);
    }
    seen.forEach(op => merged.push(op));

    // Send each via ApricityUI bridge
    for (const op of merged) {
      sendCarvePacket(op.path, op.action, op.paletteIdx);
    }
  }

  /**
   * Send a CarveActionPacket to the server.
   * Bridge: window.__quadcarve.sendPacket is injected by the ApricityUI/Java bridge.
   * Fallback: no-op (optimistic update is still visible; server will sync on next tick).
   */
  function sendCarvePacket(path, action, paletteIdx) {
    if (window.__quadcarve && typeof window.__quadcarve.sendPacket === 'function') {
      window.__quadcarve.sendPacket(path, action, paletteIdx);
    }
  }

  /* ── Mouse / pointer interaction ─────────────────────────── */
  canvas.addEventListener('mousedown', e => {
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      // Middle/alt-click: start pan
      dragging = true;
      dragX0   = e.clientX;
      dragY0   = e.clientY;
      panX0    = panX;
      panY0    = panY;
      e.preventDefault();
      return;
    }

    if (finished || !optimisticTree) return;

    const rect = canvas.getBoundingClientRect();
    const path = screenToPath(e.clientX - rect.left, e.clientY - rect.top);
    if (path === null) return;

    if (mode === 'split') {
      optimisticSplit(optimisticTree, path);
      queueAction(path, 0); // SPLIT
    } else if (mode === 'remove') {
      optimisticRemove(optimisticTree, path);
      queueAction(path, 1); // REMOVE
    }
    redraw();
  });

  canvas.addEventListener('mousemove', e => {
    if (dragging) {
      panX = panX0 + (e.clientX - dragX0);
      panY = panY0 + (e.clientY - dragY0);
      redraw();
      return;
    }
    if (!optimisticTree) return;
    const rect    = canvas.getBoundingClientRect();
    const newPath = screenToPath(e.clientX - rect.left, e.clientY - rect.top);
    if (newPath !== hoverPath) { hoverPath = newPath; redraw(); }
  });

  canvas.addEventListener('mouseup',    () => { dragging = false; });
  canvas.addEventListener('mouseleave', () => { dragging = false; hoverPath = null; redraw(); });

  // Zoom with scroll wheel
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : (1 / 1.15);
    const W = canvas.width, H = canvas.height;
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;
    const size = Math.min(W, H) * scale;
    const ox   = (W - size) / 2 + panX;
    const oy   = (H - size) / 2 + panY;
    // Zoom toward mouse
    panX  = mx - (mx - ox) * factor;
    panY  = my - (my - oy) * factor;
    scale = Math.min(Math.max(scale * factor, 0.2), 16);
    redraw();
  }, { passive: false });

  /* ── Toolbar buttons ──────────────────────────────────────── */
  function setMode(m) {
    mode = m;
    document.getElementById('btn-split').classList.toggle('active',  m === 'split');
    document.getElementById('btn-remove').classList.toggle('active', m === 'remove');
  }

  document.getElementById('btn-split').addEventListener('click',  () => setMode('split'));
  document.getElementById('btn-remove').addEventListener('click', () => setMode('remove'));

  document.getElementById('btn-zoom-in').addEventListener('click', () => {
    scale = Math.min(scale * 1.3, 16); redraw();
  });
  document.getElementById('btn-zoom-out').addEventListener('click', () => {
    scale = Math.max(scale / 1.3, 0.2); redraw();
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    scale = 1; panX = 0; panY = 0; redraw();
  });

  /* ── Keyboard shortcuts ───────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 's' || e.key === 'S') setMode('split');
    if (e.key === 'r' || e.key === 'R') setMode('remove');
    if (e.key === '+' || e.key === '=') { scale = Math.min(scale * 1.2, 16); redraw(); }
    if (e.key === '-')                  { scale = Math.max(scale / 1.2, 0.2); redraw(); }
    if (e.key === 'Home')               { scale = 1; panX = 0; panY = 0; redraw(); }
  });

  /* ── Swatch rebuild ───────────────────────────────────────── */
  function rebuildSwatches() {
    swatches.innerHTML = '';
    for (let i = 2; i < palette.length; i++) {
      const e   = palette[i];
      const div = document.createElement('div');
      div.className = 'qc-swatch' + (i === activeMat ? ' active' : '');
      div.title     = e.id || '';
      div.style.background = paletteColour(i) || '#888';
      div.addEventListener('click', () => {
        activeMat = i;
        document.querySelectorAll('.qc-swatch').forEach(s => s.classList.remove('active'));
        div.classList.add('active');
      });
      swatches.appendChild(div);
    }
  }

  /* ── Server sync – fired by SyncCarvedItemPacket via Window.dispatchEvent ── */
  window.addEventListener('quadcarve:sync', function (e) {
    const d    = e.data;   // CarvingData Java object (Rhino interop)
    palette    = buildJSPalette(d.getPalette());
    finished   = d.isFinished();
    tree       = buildJSTree(d.getTree());
    optimisticTree = cloneTree(tree);
    rebuildSwatches();
    redraw();
  });

  /* ── JS → Java bridge: stub for sending CarveActionPackets ── */
  window.__quadcarve = {
    /** Injected by Java side to send a CarveActionPacket to the server. */
    sendPacket: null,
  };

  /* ── Init ─────────────────────────────────────────────────── */
  resizeCanvas();
  msgEl.textContent = 'Place a carved item in the slot';
  redraw();

  // Resize observer
  if (window.ResizeObserver) {
    new ResizeObserver(resizeCanvas).observe(vp);
  }

})();
</script>
